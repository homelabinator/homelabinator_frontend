<section class="category-pane" style="--cat-color: {{ .category.color }}; grid-column: span {{ .category.max_width }};">
    <div class="category-header">
        <h2>{{ .category.name }}</h2>
    </div>
    <div class="category-content">
        {{ $apps := where .context.Site.RegularPages "Section" "apps" }}
        {{ $filtered := where $apps "Params.category" .category.name }}
        {{ $count := len $filtered }}
        
        <div class="apps-grid-container {{ if gt $count 5 }}expandable{{ end }}">
            <div class="apps-grid" style="grid-template-columns: repeat({{ .category.max_width }}, 1fr);">
                {{ range $filtered }}
                    {{ partial "app-card.html" . }}
                {{ end }}
            </div>
        </div>
        
        {{ if gt $count 5 }}
        <div class="show-more-container">
            <button class="show-more-btn" onclick="toggleCategory(this)">Show more</button>
        </div>
        {{ end }}
    </div>
</section>
