<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=SF+Pro+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-left">
            <a href="/" style="text-decoration: none; color: inherit;"><h1 class="logo">HomeLabinator</h1></a>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <img src="https://www.figma.com/api/mcp/asset/d8d8e99a-2e92-4b3d-9725-54326d0d0990" alt="Search" class="search-icon">
                <input type="text" placeholder="Search for Apps and Replacements">
            </div>
        </div>
        <div class="header-right">
            <a href="https://github.com" class="header-btn">Github</a>
            <a href="#" class="header-btn">About</a>
        </div>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <div id="next-button" class="next-button-container hidden">
        <button onclick="getDownloadLink()" class="next-btn">
            Next
            <img src="https://www.figma.com/api/mcp/asset/dfdbd61c-a2ec-444d-a161-54bd940ef5b8" alt="Next" class="next-icon">
        </button>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
