<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=SF+Pro+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-left">
            <a href="/" style="text-decoration: none; color: inherit;"><h1 class="logo">HomeLabinator</h1></a>
        </div>
        <div class="header-center">
            <div class="search-bar {{ if eq .Type "apps" }}disabled{{ end }}">
                <img src="https://www.figma.com/api/mcp/asset/d8d8e99a-2e92-4b3d-9725-54326d0d0990" alt="Search" class="search-icon">
                <input type="text" placeholder="Search for Apps and Replacements" {{ if eq .Type "apps" }}disabled{{ end }}>
            </div>
        </div>
        <div class="header-right">
            <a href="https://github.com/homelabinator" class="header-btn">GitHub</a>
            <a href="#" class="header-btn">About</a>
        </div>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <div id="next-button" class="next-button-container hidden">
        <button onclick="getDownloadLink()" class="next-btn">
            <span>Next</span>
            <svg class="next-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
